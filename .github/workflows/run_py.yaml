name: Run Cert Check Script

on:
  push:
    branches: [ "main" ]
    # 自身が更新した result.json で再起動しないよう、このファイルを無視設定にする
    paths-ignore:
      - 'result.json'
  schedule:
    - cron: '0 12 * * 0'  # 毎週日曜 21:00 (JST)
  workflow_dispatch:      # 手動実行用

# リポジトリへの書き込み権限を明示的に許可
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: リポジトリをチェックアウト
      uses: actions/checkout@v4

    - name: Pythonのセットアップ
      uses: actions/setup-python@v5
      with:
        # 2026年時点の安定版。3.14はまだ開発途上の可能性があるため3.12/3.13推奨
        python-version: '3.12'

    - name: 依存ライブラリのインストール
      run: |
        python -m pip install --upgrade pip
        # 実行に必要な requests をインストール
        pip install requests

    - name: Pythonスクリプトの実行
      run: python start_check.py

    - name: 結果をコミットしてプッシュ
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        # ファイルが存在する場合のみ追加・コミット
        if [ -f result.json ]; then
          git add result.json
          git commit -m "Update certificate check results [skip ci]" || echo "No changes to commit"
          git push
        fi
